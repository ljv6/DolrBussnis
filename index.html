<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title">تحميل...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .store-logo { max-height: 50px; transition: transform 0.3s; }
        .product-card { background: #1e293b; border: 1px solid #334155; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); border-color: #3b82f6; }
        #paymentModal { display: none; }
        #paymentModal.active { display: flex; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <nav class="flex items-center justify-between px-6 py-5 sticky top-0 z-50 bg-[#1e293b]/80 backdrop-blur-md border-b border-gray-700">
        <img src="" alt="Logo" class="store-logo cursor-pointer" onclick="location.reload()">
        <div id="store-name-nav" class="font-black text-xl text-blue-500"></div>
        <div class="text-xl">🛒</div>
    </nav>

    <header class="relative h-[40vh] flex items-center justify-center overflow-hidden bg-black">
        <img id="main-banner-img" src="" class="absolute inset-0 w-full h-full object-cover opacity-40">
        <div class="relative z-10 text-center">
            <h1 id="banner-title" class="text-4xl md:text-6xl font-black mb-2"></h1>
            <p id="banner-sub" class="text-blue-400 font-bold"></p>
        </div>
    </header>

    <section class="py-10 px-6">
        <div class="max-w-6xl mx-auto flex gap-4 overflow-x-auto no-scrollbar pb-4" id="categories-list"></div>
    </section>

    <section class="px-6 py-10">
        <div class="max-w-6xl mx-auto">
            <h3 class="text-xl font-bold mb-8 border-r-4 border-blue-500 pr-3">وصل حديثاً</h3>
            <div id="products-list" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </div>
    </section>

    <section class="bg-[#1e293b]/30 py-12 px-6">
        <div class="max-w-6xl mx-auto">
            <h3 class="text-center text-2xl font-black mb-10">ماذا قالوا عنا؟ ⭐</h3>
            <div id="reviews-container" class="flex gap-6 overflow-x-auto pb-6 snap-x"></div>
        </div>
    </section>

    <footer class="py-10 border-t border-gray-800 text-center">
        <img src="" class="store-logo mx-auto mb-4 opacity-50">
        <p id="footer-copyright" class="text-gray-500 text-sm"></p>
        <div id="social-container" class="flex justify-center gap-4 mt-6"></div>
    </footer>

    <div id="paymentModal" class="fixed inset-0 z-[100] bg-black/90 items-center justify-center p-4">
        <div class="bg-[#1e293b] w-full max-w-md rounded-3xl p-6 border border-gray-700">
            <img id="modalImg" src="" class="w-full h-48 object-cover rounded-2xl mb-4">
            <h2 id="modalProdName" class="text-xl font-bold mb-1 text-white"></h2>
            <p id="modalPriceDisplay" class="text-blue-500 font-black text-2xl mb-6"></p>
            <div class="space-y-4">
                <input type="tel" id="phone" placeholder="رقم الجوال (05xxxxxxxx)" class="w-full p-4 rounded-xl bg-gray-900 border border-gray-700 outline-none text-white focus:border-blue-500">
                <button id="payBtn" onclick="initiateOrder()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold text-lg transition shadow-lg shadow-blue-900/20">إتمام الطلب الآن</button>
                <button onclick="closeModal()" class="w-full text-gray-500 text-sm">إلغاء الأمر</button>
            </div>
        </div>
    </div>

    <script>
        const storeConfig = {
            storeName: "دولر بلس | Dolr Plus",
            copyright: "جميع الحقوق محفوظة © 2024 دولر بلس",
            logo: "https://i.ibb.co/68XW9QG/IMG-7454.jpg", // رابط لوجو افتراضي
            support: {
                whatsapp: "966595234388",
                instagram: "dolr_plus"
            },
            telegram: {
                token: "8254444681:AAHYJz1CtqVTT1ovCVUOPCckj3AySLAs8UI",
                chatId: "591768998"
            }
        };

        function getStoreConfig() {
            const saved = localStorage.getItem('admin_store_config');
            return saved ? JSON.parse(saved) : storeConfig;
        }
    </script>

    <script>
        const products = [
            { id: 1, name: "شريحة بيانات STC", price: "80.00", img: "https://i.ibb.co/68XW9QG/IMG-7454.jpg" },
            { id: 2, name: "اشتراك سناب رسمي (3 أشهر)", price: "25.00", img: "https://upload.wikimedia.org/wikipedia/en/thumb/a/ad/Snapchat_logo.svg/1200px-Snapchat_logo.svg.png" },
            { id: 3, name: "اشتراك سناب رسمي (6 أشهر)", price: "45.00", img: "https://upload.wikimedia.org/wikipedia/en/thumb/a/ad/Snapchat_logo.svg/1200px-Snapchat_logo.svg.png" },
            { id: 4, name: "اشتراك سناب رسمي (12 شهر)", price: "90.00", img: "https://upload.wikimedia.org/wikipedia/en/thumb/a/ad/Snapchat_logo.svg/1200px-Snapchat_logo.svg.png" }
        ];
    </script>

    <script>
        const banners = [{
            title: "DOLR PLUS",
            subtitle: "موثوق في مركز الأعمال السعودي",
            image: "https://i.ibb.co/68XW9QG/IMG-7454.jpg"
        }];
    </script>

    <script>
        const categories = [
            { name: "سناب شات", img: "https://upload.wikimedia.org/wikipedia/en/thumb/a/ad/Snapchat_logo.svg/1200px-Snapchat_logo.svg.png" },
            { name: "ذكاء اصطناعي", img: "https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg" },
            { name: "بيانات وإتصال", img: "https://i.ibb.co/68XW9QG/IMG-7454.jpg" }
        ];
    </script>

    <script>
        const reviews = [
            { stars: "⭐⭐⭐⭐⭐", text: "خدمة سريعة جداً!", initials: "أ ش", name: "أحمد الشمري", color: "bg-blue-900/50 text-blue-400" },
            { stars: "⭐⭐⭐⭐⭐", text: "أفضل متجر شحن جربته.", initials: "س ع", name: "سارة علي", color: "bg-pink-900/50 text-pink-400" }
        ];
    </script>

    <script>
        function renderSocial() {
            const config = getStoreConfig();
            const container = document.getElementById('social-container');
            if (container) {
                container.innerHTML = `
                    <a href="https://wa.me/${config.support.whatsapp}" target="_blank" class="bg-green-500/10 text-green-500 px-4 py-2 rounded-xl border border-green-500/20">واتساب</a>
                    <a href="https://instagram.com/${config.support.instagram}" target="_blank" class="bg-pink-500/10 text-pink-500 px-4 py-2 rounded-xl border border-pink-500/20">إنستقرام</a>
                `;
            }
        }
    </script>

    <script>
        async function initiateOrder() {
            const config = getStoreConfig();
            const phone = document.getElementById('phone').value;
            const prodName = document.getElementById('modalProdName').innerText;
            const price = document.getElementById('modalPriceDisplay').innerText;

            const msg = `🔔 طلب جديد\nالمنتج: ${prodName}\nالسعر: ${price}\nالجوال: ${phone}`;
            
            try {
                await fetch(`https://api.telegram.org/bot${config.telegram.token}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({chat_id: config.telegram.chatId, text: msg})
                });
                alert("تم إرسال طلبك بنجاح!");
                closeModal();
            } catch (e) {
                alert("حدث خطأ في الإرسال");
            }
        }

        function initializeStore() {
            const config = getStoreConfig();

            document.getElementById('site-title').innerText = config.storeName;
            document.getElementById('store-name-nav').innerText = config.storeName;
            document.getElementById('footer-copyright').innerText = config.copyright;
            document.querySelectorAll('.store-logo').forEach(img => img.src = config.logo);

            // البانر
            if (banners.length > 0) {
                document.getElementById('main-banner-img').src = banners[0].image;
                document.getElementById('banner-title').innerText = banners[0].title;
                document.getElementById('banner-sub').innerText = banners[0].subtitle;
            }

            // التصنيفات
            document.getElementById('categories-list').innerHTML = categories.map(c => `
                <div class="flex-none text-center">
                    <div class="w-16 h-16 bg-gray-800 rounded-2xl p-3 mb-2 border border-gray-700">
                        <img src="${c.img}" class="w-full h-full object-contain">
                    </div>
                    <span class="text-[10px] font-bold">${c.name}</span>
                </div>
            `).join('');

            // المنتجات
            document.getElementById('products-list').innerHTML = products.map(p => `
                <div class="product-card rounded-3xl overflow-hidden cursor-pointer" onclick="openModal('${p.name}', '${p.price}', '${p.img}')">
                    <img src="${p.img}" class="w-full aspect-square object-cover">
                    <div class="p-4">
                        <h5 class="text-xs font-bold text-gray-300 mb-1">${p.name}</h5>
                        <p class="text-blue-500 font-black">${p.price} SAR</p>
                    </div>
                </div>
            `).join('');

            // الآراء
            document.getElementById('reviews-container').innerHTML = reviews.map(rev => `
                <div class="min-w-[280px] bg-gray-800 p-6 rounded-3xl border border-gray-700 snap-center">
                    <div class="text-yellow-400 mb-2">${rev.stars}</div>
                    <p class="text-sm text-gray-300 mb-4 italic">"${rev.text}"</p>
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 ${rev.color} rounded-full flex items-center justify-center font-bold">${rev.initials}</div>
                        <h4 class="text-xs font-bold">${rev.name}</h4>
                    </div>
                </div>
            `).join('');

            renderSocial();
        }

        function openModal(name, price, img) {
            document.getElementById('modalProdName').innerText = name;
            document.getElementById('modalPriceDisplay').innerText = price + " SAR";
            document.getElementById('modalImg').src = img;
            document.getElementById('paymentModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('paymentModal').classList.remove('active');
        }

        window.onload = initializeStore;
    </script>
</body>
</html>
